<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <title>eMandi UP Data Scraper</title>
  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.7);
      --border-color: rgba(255, 255, 255, 0.1);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --primary: #f59e0b; /* Mandi gold/orange */
      --primary-hover: #d97706;
      --secondary: #10b981; /* Teal/Green */
      --accent: #3b82f6;
      --danger: #ef4444;
      --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      width: 420px;
      background-color: var(--bg-color);
      color: var(--text-main);
      padding: 16px;
      overflow-x: hidden;
    }

    .container {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 20px;
      box-shadow: var(--glass-shadow);
    }

    header {
      text-align: center;
      margin-bottom: 20px;
    }

    header h1 {
      font-size: 1.4rem;
      background: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 4px;
      font-weight: 700;
    }

    header p {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    input[type="text"] {
      width: 100%;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 12px;
      color: var(--text-main);
      font-size: 0.95rem;
      outline: none;
      transition: all 0.3s ease;
      text-align: center;
      font-weight: 600;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(245, 158, 11, 0.2);
    }

    .btn-container {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      margin-bottom: 16px;
    }

    .btn {
      flex: 1;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-weight: bold;
      cursor: pointer;
      font-size: 0.95rem;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary) 0%, #d97706 100%);
      color: #000;
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(245, 158, 11, 0.4);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-color);
      color: var(--text-main);
    }

    .btn-secondary:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.1);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
    }

    /* Progress and log area */
    .progress-section {
      background: rgba(0, 0, 0, 0.25);
      border-radius: 12px;
      padding: 14px;
      border: 1px solid var(--border-color);
      margin-bottom: 16px;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      margin-bottom: 8px;
    }

    .progress-bar-container {
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--primary) 0%, var(--secondary) 100%);
      transition: width 0.3s ease;
    }

    .console-log {
      height: 90px;
      overflow-y: auto;
      background: #020617;
      border-radius: 6px;
      padding: 8px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.75rem;
      color: #34d399;
      border: 1px solid rgba(255, 255, 255, 0.05);
      white-space: pre-wrap;
    }

    .storage-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px dashed var(--border-color);
      border-radius: 8px;
      margin-bottom: 12px;
    }

    .storage-info span {
      font-size: 0.85rem;
    }

    .storage-count {
      color: var(--secondary);
      font-weight: bold;
    }

    .export-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .btn-export {
      background: var(--secondary);
      color: #020617;
    }

    .btn-export:hover:not(:disabled) {
      background: #059669;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);
    }

    .btn-clear {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: var(--danger);
    }

    .btn-clear:hover:not(:disabled) {
      background: rgba(239, 68, 68, 0.2);
    }

    .footer {
      text-align: center;
      margin-top: 16px;
      font-size: 0.7rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>eMandi UP Scraper</h1>
      <p>प्रपत्र-6 प्रिंट विवरण संकलक</p>
    </header>

    <!-- Single Input field for Prapatra-6 -->
    <div class="form-group">
      <label for="prapatra-single">खोजने के लिए प्रपत्र-6 संख्या दर्ज करें:</label>
      <input type="text" id="prapatra-single" placeholder="उदा. 00580 या पूरा नंबर">
    </div>

    <div class="btn-container">
      <button class="btn btn-secondary" id="btn-reset">रिसेट</button>
      <button class="btn btn-primary" id="btn-start">खोजें और प्रिंट करें</button>
    </div>

    <!-- Progress status -->
    <div class="progress-section">
      <div class="progress-header">
        <span id="progress-status">तैयार है (Ready)</span>
        <span id="progress-percent">0%</span>
      </div>
      <div class="progress-bar-container">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <div class="console-log" id="console-log">Logs will appear here...</div>
    </div>

    <!-- Storage and Actions -->
    <div class="storage-info">
      <span>सुरक्षित रिकॉर्ड्स की संख्या:</span>
      <span class="storage-count" id="record-count">0</span>
    </div>

    <div class="export-grid">
      <button class="btn btn-export" id="btn-export">CSV डाउनलोड</button>
      <button class="btn btn-clear" id="btn-clear">डेटा साफ़ करें</button>
    </div>

    <div class="footer">
      Mandi Import Automated System Extension v1.1
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
