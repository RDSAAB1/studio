<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <title>eMandi UP Scraper Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-color: #090d16;
      --card-bg: rgba(30, 41, 59, 0.7);
      --border-color: rgba(255, 255, 255, 0.08);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --primary: #f59e0b; /* Mandi Gold */
      --primary-hover: #d97706;
      --secondary: #10b981; /* Teal */
      --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Plus Jakarta Sans', 'Segoe UI', sans-serif;
    }

    body {
      width: 360px;
      background-color: var(--bg-color);
      color: var(--text-main);
      padding: 16px;
      overflow: hidden;
    }

    .container {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 20px;
      box-shadow: var(--glass-shadow);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    header {
      text-align: center;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 12px;
    }

    .brand-logo {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary) 0%, #ef4444 100%);
      border-radius: 10px;
      margin: 0 auto 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      font-weight: 800;
      color: #0f172a;
      box-shadow: 0 4px 14px rgba(245, 158, 11, 0.3);
    }

    header h1 {
      font-size: 1.2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    header p {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 3px;
    }

    /* Main Big CTA Button */
    .dashboard-launcher {
      background: linear-gradient(135deg, var(--primary) 0%, #ef4444 100%);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(245, 158, 11, 0.25);
      transition: var(--transition);
      border: none;
      width: 100%;
      color: #0f172a;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .dashboard-launcher:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(245, 158, 11, 0.35);
    }

    .dashboard-launcher span.title {
      font-size: 0.95rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .dashboard-launcher span.desc {
      font-size: 0.7rem;
      font-weight: 600;
      opacity: 0.85;
    }

    /* Quick status widget */
    .status-widget {
      background: rgba(15, 23, 42, 0.5);
      border-radius: 10px;
      padding: 10px 14px;
      border: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.78rem;
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 700;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--danger);
      box-shadow: 0 0 8px var(--danger);
    }

    .dot.online {
      background: var(--secondary);
      box-shadow: 0 0 8px var(--secondary);
    }

    /* Stats summary */
    .quick-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .quick-stat-box {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 10px;
      text-align: center;
    }

    .quick-stat-box .num {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--primary);
    }

    .quick-stat-box .lbl {
      font-size: 0.65rem;
      color: var(--text-muted);
      margin-top: 2px;
      font-weight: 600;
    }

    .footer-links {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.72rem;
      border-top: 1px solid var(--border-color);
      padding-top: 12px;
    }

    .footer-links a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      transition: var(--transition);
    }

    .footer-links a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="brand-logo">eM</div>
      <h1>eMandi UP Scraper</h1>
      <p>प्रपत्र-6 एवं भुगतान विवरण संकलक</p>
    </header>

    <!-- Launcher Button -->
    <button class="dashboard-launcher" id="btn-open-dashboard">
      <span class="title">सॉफ्टवेयर डैशबोर्ड खोलें</span>
      <span class="desc">Open Full Screen Dashboard</span>
    </button>

    <!-- Connection Status -->
    <div class="status-widget">
      <span>मंडी पोर्टल कनेक्शन:</span>
      <div class="status-indicator" id="status-indicator">
        <span class="dot" id="status-dot"></span>
        <span id="status-text">Disconnected</span>
      </div>
    </div>

    <!-- Quick Stats -->
    <div class="quick-stats">
      <div class="quick-stat-box">
        <div class="num" id="stat-records">0</div>
        <div class="lbl">सुरक्षित रिकॉर्ड्स</div>
      </div>
      <div class="quick-stat-box">
        <div class="num" id="stat-qty">0.00</div>
        <div class="lbl">कुल तौल (Qtl)</div>
      </div>
    </div>

    <!-- Footer Gateway links -->
    <div class="footer-links">
      <a href="http://localhost:3000" target="_blank">लोकल सॉफ्टवेयर खोलें ↗</a>
      <span style="color: var(--text-muted); font-size: 0.65rem;">v2.0 Scraper Pro</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
